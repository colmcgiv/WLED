name: ESP32-C6 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WLED version used in the release asset name'
        required: true
        default: '16.0.1'
      tag:
        description: 'Release tag to create or update'
        required: true
        default: 'esp32-c6-v16.0.1'
      target:
        description: 'Branch, tag, or commit SHA to build'
        required: true
        default: 'main'

permissions:
  contents: write

env:
  PIO_ENV: esp32c6dev_4MB
  RELEASE_NAME: ESP32-C6_4MB

jobs:
  build-and-release:
    name: Build and publish ESP32-C6 binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Node dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.18

      - name: Build ESP32-C6 firmware
        run: pio run -e "$PIO_ENV"

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          bin="build_output/release/WLED_${{ inputs.version }}_${RELEASE_NAME}.bin"
          if [[ ! -f "$bin" ]]; then
            echo "::error::Expected release asset not found: $bin"
            find build_output -maxdepth 3 -type f -print || true
            exit 1
          fi

          bin_dir="$(dirname "$bin")"
          bin_name="$(basename "$bin")"
          (cd "$bin_dir" && shasum -a 256 "$bin_name") > "$bin.sha256"

          echo "bin=$bin" >> "$GITHUB_OUTPUT"
          echo "sha=$bin.sha256" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          WLED ${{ inputs.version }} with ESP32-C6 compatibility

          Custom fork build, not byte-for-byte official upstream v16.0.1.

          Built target: \`${PIO_ENV}\`

          Source branch/target: \`${{ inputs.target }}\`
          Source commit SHA: \`${{ steps.assets.outputs.commit }}\`
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ inputs.tag }}"
          title="WLED ${{ inputs.version }} ESP32-C6"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md \
              --target "${{ steps.assets.outputs.commit }}" \
              --draft=false \
              --prerelease=false \
              --latest
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --target "${{ steps.assets.outputs.commit }}" \
              --title "$title" \
              --notes-file release-notes.md \
              --latest
          fi

          gh release upload "$tag" \
            "${{ steps.assets.outputs.bin }}" \
            "${{ steps.assets.outputs.sha }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
